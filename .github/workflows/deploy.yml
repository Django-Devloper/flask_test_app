name: Deploy to ECS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::919221584939:role/githubdeployemt
          aws-region: eu-north-1

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
          --cluster enlightened-panda-af1gwf \
          --service newtaskdifinition-service-yxp40qlj \
          --force-new-deployment