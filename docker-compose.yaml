version: "3.9"

services:
  happy_goldberg:
    build : 
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: "1.0"

    container_name: happy_goldberg
    hostname: flask-app

    ports :
      [5000:5000]

    restart: unless-stopped

    command: ["gunicorn","-w","2","-b","0.0.0.0:5000","app:app"]
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

