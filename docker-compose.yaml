version: "3.9"

services:
  happy_goldberg:
    build : 
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: "1.0"

    container_name: happy_goldberg
    hostname: flask-app

    ports :
      [8001:8000]

    restart: unless-stopped

    command: ["python", "app.py"]
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

